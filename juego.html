<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gran Moishe">
  <meta name="theme-color" content="#07111e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="almagro.jpg">
  <title>Gran Moishe 2026 — Fantasy Fútbol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#07111e;-webkit-font-smoothing:antialiased;}
.app,.login-screen,.profile-setup,.splash,.index-page{min-height:100vh;font-family:'Inter',sans-serif;background:#07111e;color:#e2e8f0;}

/* SPLASH */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:linear-gradient(135deg,#07111e,#0d2a1a);}
.splash-b{font-size:3rem;animation:pulse 1.2s ease-in-out infinite;}
.splash-t{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:4px;color:#4ade80;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}

/* TOAST */
.toast-wrap{position:fixed;top:84px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{padding:10px 18px;border-radius:8px;font-weight:600;font-size:.85rem;border-left:4px solid;animation:tin .3s ease;pointer-events:none;max-width:320px;}
.toast.success{background:#032a12;border-color:#4ade80;color:#4ade80;}
.toast.error{background:#2a0808;border-color:#ef4444;color:#ef4444;}
.toast.warn{background:#2a1a00;border-color:#fbbf24;color:#fbbf24;}
.toast.info{background:#0a1830;border-color:#60a5fa;color:#60a5fa;}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

/* ── INDEX PAGE ── */
.index-page{display:flex;flex-direction:column;background:#07111e;}
.idx-hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(ellipse at 30% 40%,#0d3a1e 0%,#07111e 60%);padding-top:56px;}
.idx-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(74,222,128,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.idx-hero-content{position:relative;z-index:2;text-align:center;padding:40px 24px;max-width:700px;}
.idx-logo{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:32px;}
.idx-header{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(7,17,30,.92);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(8px);}
.idx-hdr-brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:#e2e8f0;}
.idx-hdr-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.5px;}
.idx-hdr-actions{display:flex;align-items:center;gap:8px;}
.idx-hdr-ig{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;text-decoration:none;font-size:.78rem;font-weight:700;}
.idx-feat-premio{border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.05);}
.idx-feat-premio .idx-feat-t{color:#fbbf24;}
.idx-star{font-size:3.5rem;filter:drop-shadow(0 0 20px rgba(74,222,128,.6));animation:pulse 2s ease-in-out infinite;}
.idx-pretitle{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:400;letter-spacing:8px;color:#4a7a5a;text-align:left;line-height:1;}
.idx-title{font-family:'Oswald',sans-serif;font-size:4.5rem;font-weight:900;letter-spacing:4px;color:#fff;line-height:1;text-shadow:0 0 40px rgba(74,222,128,.3);}
.idx-subtitle{font-size:.7rem;letter-spacing:3px;color:#2a5a3a;text-transform:uppercase;text-align:left;margin-top:4px;}
.idx-tagline{font-size:1.1rem;color:#8a9ab0;margin-bottom:32px;line-height:1.6;}
.idx-ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
.idx-btn{padding:14px 32px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:.2s;border:none;}
.idx-btn.primary{background:#4ade80;color:#07111e;}
.idx-btn.primary:hover{background:#22c55e;transform:translateY(-2px);}
.idx-btn.secondary{background:transparent;border:2px solid #4ade80;color:#4ade80;}
.idx-btn.secondary:hover{background:rgba(74,222,128,.1);}
.idx-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.idx-feat{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;text-align:left;}
.idx-feat-i{font-size:1.4rem;flex-shrink:0;}
.idx-feat-t{font-weight:600;font-size:.85rem;color:#e2e8f0;}
.idx-feat-d{font-size:.72rem;color:#5a7a8a;margin-top:2px;}

/* AUTH */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);overflow-y:auto;}
.auth-modal{background:#0d1b2a;border:1px solid #1a3a28;border-radius:14px;padding:28px;max-width:540px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
.auth-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.08);border:none;color:#8a9ab0;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;}
.auth-logo{font-size:2rem;text-align:center;margin-bottom:6px;filter:drop-shadow(0 0 8px rgba(74,222,128,.4));}
.auth-title{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;text-align:center;letter-spacing:1px;margin-bottom:4px;}
.auth-price{font-size:.78rem;color:#4ade80;text-align:center;margin-bottom:16px;}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-err{color:#ef4444;font-size:.82rem;padding:8px 12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;margin-top:4px;}
.auth-switch{background:transparent;border:none;color:#4a7a5a;font-size:.82rem;cursor:pointer;margin-top:8px;text-decoration:underline;}

/* CAROUSEL */
.ad-carousel-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#07111e;border-top:1px solid #1a2d40;box-shadow:0 -4px 20px rgba(0,0,0,.5);min-height:44px;}
.adc-inner{cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;max-height:80px;min-height:44px;}
.adc-img{width:100%;max-height:80px;object-fit:cover;display:block;}
.adc-no-img{padding:18px;font-size:.72rem;color:#2a4a3a;letter-spacing:2px;text-transform:uppercase;}
.adc-dots{position:absolute;bottom:6px;right:10px;display:flex;gap:5px;}
.adc-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;}
.adc-dot.active{background:#4ade80;}

/* FULL SCREEN AD */
.fullad-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:5000;display:flex;flex-direction:column;}
.fullad-content{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.fullad-inner{text-align:center;padding:24px;overflow-y:auto;max-height:80vh;}
.fullad-tier{font-size:.9rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.fullad-name{display:none;}
.fullad-hint{font-size:.85rem;color:#5a7a6a;}
.fullad-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:#0a1525;border-top:1px solid #1a2d40;}
.fullad-timer{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:#e2e8f0;}
.fullad-skip{background:#4ade80;color:#07111e;border:none;padding:10px 24px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.fullad-wait{font-size:.82rem;color:#5a7a6a;}

/* AD BANNER */
.ad-banner{cursor:pointer;background:#0a1525;border:1px solid #1a2d40;border-radius:0;overflow:hidden;}
.top-banner{height:60px;display:flex;align-items:center;justify-content:center;}
.bottom-banner{height:60px;display:flex;align-items:center;justify-content:center;margin-top:auto;}
.ad-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;padding:10px;text-align:center;background:#080f18;}
.ad-tier-label{font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.ad-name{font-size:.78rem;font-weight:600;color:#e2e8f0;margin-top:3px;}
.ad-cta{font-size:.65rem;color:#4a6a5a;margin-top:2px;}

/* SIDEBAR ADS */
.sidebar-ads{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;padding:10px 10px 10px 12px;height:calc(100vh - 58px);position:sticky;top:58px;overflow:hidden;border-left:1px solid #1a2d40;}
.sba-label{display:block;font-size:.55rem;letter-spacing:2px;color:#1a3a28;text-transform:uppercase;text-align:center;font-weight:700;margin-bottom:2px;padding-bottom:6px;border-bottom:1px solid #0f2a18;}
.sba-item{border-radius:10px;overflow:hidden;border:1px solid #1a2d40;cursor:pointer;transition:.2s;flex:1;min-height:0;background:#080f18;}
.sba-item:hover{border-color:#2a4a38;transform:scale(1.01);}
.sba-item img{width:100%;height:100%;object-fit:cover;display:block;}
.ad-placeholder{min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#0a1622;padding:16px;text-align:center;}

/* APP LAYOUT */
.app-layout{display:flex;width:100%;}
.main{flex:1;padding:10px 12px 14px;min-width:0;overflow-x:hidden;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0a1b2a,#071a10);border-bottom:2px solid #1a3a20;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:200;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.hdr-{font-size:1.8rem;filter:drop-shadow(0 0 8px rgba(74,222,128,.5));}
.hdr-title{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:3px;color:#fff;line-height:1;}
.hdr-yr{color:#4ade80;}
.hdr-sub{font-size:.55rem;letter-spacing:2.5px;color:#2a5a30;text-transform:uppercase;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-stats{display:flex;gap:6px;flex-wrap:wrap;}
.hst{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:6px 10px;}
.hst-v{display:block;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;line-height:1;}
.hst-n{display:block;font-size:.55rem;letter-spacing:1px;color:#4a6a5a;text-transform:uppercase;}
.hdr-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:6px 10px;}
.hdr-av{width:32px;height:32px;background:linear-gradient(135deg,#4ade80,#22c55e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#07111e;flex-shrink:0;}
.hdr-un{font-size:.8rem;font-weight:600;line-height:1.1;}
.hdr-ut{font-size:.65rem;color:#4a6a5a;margin-top:1px;}
.btn-ut{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:7px;padding:7px 11px;font-size:.8rem;cursor:pointer;}

/* NAV */
.nav{display:flex;background:#0a1525;border-bottom:1px solid #1a2d40;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ntab{flex:1;min-width:70px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;background:none;border:none;border-bottom:3px solid transparent;color:#3a5a6a;font-family:'Oswald',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap;}
.ntab span:first-child{font-size:.95rem;}
.ntab-lbl{font-size:.65rem;letter-spacing:.5px;}
.ntab.active{color:#4ade80;border-bottom-color:#4ade80;background:rgba(74,222,128,.05);}
.ntab.admin-tab{color:#fbbf24;}
.ntab.admin-tab.active{color:#fbbf24;border-bottom-color:#fbbf24;background:rgba(251,191,36,.05);}

/* PITCH */
.pitch-full{display:flex;flex-direction:column;gap:0;}
.pitch-row{display:flex;gap:0;align-items:stretch;}
.pitch-ad-side{width:200px;min-height:260px;background:#0a1525;border:1px solid #1a2d40;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border-radius:10px;overflow:hidden;}
.pitch-ad-side.empty{border-style:dashed;opacity:.4;}
.pitch-ad-col{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.pitch-container{flex:1;display:flex;flex-direction:column;}
.pitch-grass{position:relative;width:100%;padding-bottom:72%;background:repeating-linear-gradient(180deg,#1a4d2e 0px,#1a4d2e 38px,#1e5534 38px,#1e5534 76px);border:2px solid #2a6a3e;overflow:hidden;}
.pitch-lines{position:absolute;inset:0;pointer-events:none;}
.pl-cl{position:absolute;top:50%;left:4%;right:4%;height:2px;background:rgba(255,255,255,.18);}
.pl-cc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,255,255,.18);}
.pl-pt{position:absolute;top:0;left:22%;right:22%;height:14%;border:2px solid rgba(255,255,255,.15);border-top:none;border-radius:0 0 8px 8px;}
.pl-pb{position:absolute;bottom:0;left:22%;right:22%;height:14%;border:2px solid rgba(255,255,255,.15);border-bottom:none;border-radius:8px 8px 0 0;}
.pp-slot{position:absolute;transform:translate(-50%,-50%);width:62px;text-align:center;cursor:pointer;z-index:3;}
.pp-slot.sub{opacity:.85;}
.pp-circle{background:rgba(7,17,30,.88);border:2px solid rgba(255,255,255,.2);border-radius:10px;padding:4px 3px;transition:.2s;position:relative;}
.pp-slot.filled:hover .pp-circle,.pp-slot:hover .pp-circle{border-color:#ef4444;background:rgba(239,68,68,.15);}
.pp-cap{position:absolute;top:-6px;right:-6px;background:#FFD700;color:#111;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;}
.pp-num{font-size:.55rem;font-weight:700;border-radius:3px;color:#fff;padding:1px 3px;margin-bottom:2px;}
.pp-name{font-size:.6rem;font-weight:700;color:#e2e8f0;line-height:1.1;}
.pp-pts{font-size:.58rem;color:#4ade80;font-weight:700;margin-top:1px;}
.pp-badge,.pp-elim{position:absolute;top:-5px;left:-5px;font-size:.65rem;}
.pitch-subs{background:#071a10;border:1px solid #1a3a20;border-top:none;padding:10px;}
.subs-label{font-size:.68rem;letter-spacing:2px;color:#2a5a30;text-transform:uppercase;margin-bottom:8px;font-family:'Oswald',sans-serif;}
.subs-row{display:flex;gap:8px;flex-wrap:wrap;}
.sub-slot{flex:1;min-width:70px;background:rgba(7,17,30,.9);border:2px solid rgba(255,255,255,.1);border-radius:8px;padding:6px;text-align:center;cursor:pointer;position:relative;transition:.2s;}
.sub-slot:hover{border-color:#60a5fa;}
.sub-slot.empty{opacity:.3;cursor:default;}
.sub-cap{position:absolute;top:-5px;right:-5px;background:#FFD700;color:#111;border-radius:50%;width:14px;height:14px;font-size:.55rem;font-weight:900;display:flex;align-items:center;justify-content:center;}
.sub-pos{font-size:.55rem;font-weight:700;border-radius:3px;color:#fff;padding:1px 4px;margin-bottom:2px;display:inline-block;}
.sub-name{font-size:.65rem;font-weight:700;color:#e2e8f0;line-height:1.1;}
.sub-pts{font-size:.6rem;color:#60a5fa;font-weight:700;}

/* FORM ELEMENTS */
.ps-form{display:flex;flex-direction:column;gap:14px;}
.ps-row2{display:flex;gap:12px;}
.ps-row2>*{flex:1;}
.pf{display:flex;flex-direction:column;gap:5px;}
.pf label{font-size:.72rem;font-weight:600;letter-spacing:1px;color:#4a6a7a;text-transform:uppercase;}
.pf input,.pf select{background:#0a1525;border:1px solid #1e2d40;color:#e2e8f0;border-radius:7px;padding:9px 11px;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:.2s;width:100%;}
.pf input:focus,.pf select:focus{border-color:#4ade80;}
.pf input.err,.pf select.err{border-color:#ef4444;}
.ferr{font-size:.7rem;color:#ef4444;}
.btn-save{background:#4ade80;color:#07111e;border:none;border-radius:8px;padding:12px;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:.2s;}
.btn-save:hover{background:#22c55e;}
.btn-save:disabled{opacity:.6;cursor:not-allowed;}

/* MARKET */
.market-view{display:flex;flex-direction:column;gap:12px;}
.mkt-filters{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:9px;}
.mkt-search{width:100%;background:#0a1525;border:1px solid #1e2d40;border-radius:6px;padding:9px 12px;color:#e2e8f0;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;}
.mkt-search:focus{border-color:#4ade80;}
.mkt-search::placeholder{color:#3a5a6a;}
.mkt-row{display:flex;gap:7px;flex-wrap:wrap;}
.mkt-sel{flex:1;min-width:130px;background:#0a1525;border:1px solid #1e2d40;color:#e2e8f0;border-radius:6px;padding:7px 8px;font-size:.8rem;cursor:pointer;}
.mkt-meta{display:flex;justify-content:space-between;font-size:.75rem;color:#4a5a6a;flex-wrap:wrap;gap:4px;}
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;}
.mkt-more{text-align:center;color:#4a5a6a;font-size:.8rem;padding:10px;}
.mkt-card{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;overflow:hidden;cursor:pointer;transition:.18s;}
.mkt-card:hover{border-color:#2a4a6a;transform:translateY(-1px);}
.mkt-card.in-squad{border-color:#1a3a20;background:#071a10;}
.mkt-card.unavail{opacity:.5;}
.mkt-card.eliminated{border-color:#3a1a1a;}
.mc-tier{font-family:'Oswald',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.8px;padding:3px 8px;text-align:center;}
.mc-body{display:flex;align-items:center;gap:7px;padding:9px 9px 5px;}
.mc-flag{font-size:1.1rem;flex-shrink:0;}
.mc-info{flex:1;min-width:0;}
.mc-name{font-weight:600;font-size:.83rem;display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-sub{font-size:.7rem;color:#4a6a7a;margin-top:1px;}
.mc-r{text-align:right;flex-shrink:0;}
.mc-pts{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;color:#4ade80;line-height:1;}
.mc-pts span{font-size:.6rem;color:#2a6a3a;margin-left:2px;}
.mc-val{font-size:.7rem;color:#6a7a8a;}
.mc-foot{padding:0 9px 9px;display:flex;align-items:center;justify-content:space-between;gap:7px;}
.mc-badge{font-size:.7rem;color:#4ade80;font-weight:600;}
.mc-rm{background:transparent;border:1px solid #ef4444;color:#ef4444;border-radius:5px;padding:4px 9px;font-size:.72rem;font-weight:700;cursor:pointer;}
.mc-add{flex:1;background:#4ade80;color:#07111e;border:none;border-radius:5px;padding:6px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;}
.mc-add.dis{background:#1a2d3a;color:#3a5a6a;cursor:not-allowed;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal{background:#0d1b2a;border:1px solid #1a3a28;border-radius:14px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:11px;right:11px;background:rgba(255,255,255,.08);border:none;color:#8a9ab0;width:28px;height:28px;border-radius:50%;font-size:.85rem;cursor:pointer;z-index:2;}
.modal-hd{display:flex;align-items:center;gap:11px;padding:16px;border-bottom:2px solid;border-radius:14px 14px 0 0;}
.modal-body{padding:14px;display:flex;flex-direction:column;gap:12px;}
.msec{background:#0a1525;border:1px solid #1a2d40;border-radius:8px;padding:11px;}
.msec-title{font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:1.5px;color:#4a6a7a;text-transform:uppercase;margin-bottom:9px;}
.portal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;text-align:center;}
.pc-portal{background:#0d1b2a;border-radius:7px;padding:9px;}
.pcp-name{font-size:.68rem;color:#4a6a7a;letter-spacing:.5px;text-transform:uppercase;}
.pcp-score{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;margin:3px 0;}
.avg-r{text-align:center;font-size:.85rem;color:#7a8a9a;margin-top:7px;}
.avg-r strong{color:#e2e8f0;}
.sb-list{display:flex;flex-direction:column;gap:3px;}
.sb-row{display:flex;justify-content:space-between;font-size:.82rem;color:#a0b0c0;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.sb-row.g span:last-child{color:#4ade80;font-weight:700;}
.sb-row.r span:last-child{color:#ef4444;font-weight:700;}
.sb-total{display:flex;justify-content:space-between;font-weight:700;font-size:.88rem;padding:7px 0 0;border-top:1px solid #1a3a28;margin-top:3px;}
.pts-big{font-family:'Oswald',sans-serif;font-size:1.3rem;color:#4ade80;}
.forma-bar{display:flex;gap:3px;align-items:flex-end;height:46px;}
.fb-col{flex:1;border-radius:3px 3px 0 0;transition:.2s;}
.modal-acts{display:flex;flex-direction:column;gap:7px;}
.status-badge{text-align:center;background:#2a0808;color:#ef4444;border-radius:6px;padding:5px;font-size:.78rem;font-weight:600;letter-spacing:1px;}
.btn-add-lg,.btn-remove-lg{padding:11px;border-radius:8px;border:none;font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.btn-add-lg{background:#4ade80;color:#07111e;}
.btn-add-lg.dis{background:#1a2d3a;color:#3a5a6a;cursor:not-allowed;}
.btn-remove-lg{background:transparent;border:1px solid #ef4444;color:#ef4444;}
.btn-cap{padding:11px 16px;border-radius:8px;border:1px solid #fbbf24;color:#fbbf24;background:rgba(251,191,36,.08);font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;}

/* TEAM VIEW */
.team-view{display:flex;flex-direction:column;gap:12px;}
.transfer-widget{display:flex;align-items:flex-start;gap:12px;background:#0d1b2a;border:1px solid #1a2d3a;border-radius:10px;padding:12px;flex-wrap:wrap;}
.transfer-widget.closed{border-color:#2a1a1a;}
.tw-icon{font-size:1.2rem;margin-top:2px;}
.tw-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.5px;}
.tw-status{font-size:.78rem;color:#6a7a8a;margin-top:2px;}
.tw-note{font-size:.72rem;color:#fbbf24;margin-top:3px;}
.tt{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:10px 12px;}
.tt-l{display:flex;align-items:center;gap:7px;}
.tt-lbl{font-size:.68rem;letter-spacing:1.5px;color:#4a6a7a;text-transform:uppercase;font-weight:600;}
.tt-sel{background:#0a1525;border:1px solid #1e2d40;color:#e2e8f0;border-radius:6px;padding:5px 9px;font-family:'Oswald',sans-serif;font-size:.9rem;cursor:pointer;}
.tt-badges{display:flex;gap:6px;flex-wrap:wrap;}
.tt-badge{display:flex;gap:4px;align-items:center;border:1px solid;border-radius:20px;padding:2px 8px;font-size:.72rem;font-family:'Oswald',sans-serif;font-weight:700;}
.tt-acts{display:flex;gap:7px;margin-left:auto;}
.tt-btn{padding:6px 12px;border-radius:6px;border:none;font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.tt-btn.auto{background:#1a3a20;color:#4ade80;border:1px solid #2a5a30;}
.tt-btn.auto:hover{background:#4ade80;color:#07111e;}
.tt-btn.clear{background:#2a1010;color:#ef4444;border:1px solid #3a2020;}
.empty-pitch{text-align:center;padding:40px 20px;background:#0d1b2a;border:2px dashed #1a3a40;border-radius:12px;}
.ep-i{font-size:2.5rem;margin-bottom:10px;}
.ep-t{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#6a7a8a;}
.ep-s{font-size:.85rem;color:#3a5a6a;margin:6px 0 16px;max-width:300px;margin-left:auto;margin-right:auto;}
.btn-go{background:#4ade80;color:#07111e;border:none;padding:9px 22px;border-radius:6px;font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;}
.sq-sec{margin-top:8px;}
.sq-sec-title{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:2px;color:#4a6a7a;text-transform:uppercase;margin-bottom:7px;}
.sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:6px;}
.sq-card{display:flex;align-items:center;gap:6px;background:#0d1b2a;border:1px solid #1a2d40;border-radius:7px;padding:7px 9px;cursor:pointer;transition:.18s;position:relative;}
.sq-card:hover{border-color:#2a4a50;}
.sq-card.starter{border-color:#1a3a20;}
.sq-card.bench{opacity:.85;}
.sq-card.unavail{opacity:.5;}
.sq-card.cap-player{border-color:#fbbf24;background:#1a1500;}
.sqf{font-size:.95rem;}
.sqpos{font-size:.58rem;font-weight:700;padding:2px 4px;border-radius:3px;color:#fff;flex-shrink:0;}
.sqname{flex:1;font-size:.78rem;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sqpts{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:700;color:#4ade80;flex-shrink:0;}
.sqrm,.sqadd{border:none;border-radius:4px;padding:2px 6px;font-size:.72rem;font-weight:700;cursor:pointer;flex-shrink:0;}
.sqrm{background:rgba(239,68,68,.1);color:#ef4444;}
.sqadd{background:rgba(74,222,128,.1);color:#4ade80;}

/* SCORING */
.scoring-view{display:flex;flex-direction:column;gap:12px;}
.score-engine{background:linear-gradient(135deg,#0d1b2a,#071a10);border:1px solid #2a4a38;border-radius:12px;padding:16px;}
.se-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.se-total{font-family:'Oswald',sans-serif;font-size:3rem;font-weight:700;color:#4ade80;line-height:1;}
.se-total span{font-size:1rem;margin-left:3px;color:#2a5a3a;}
.se-lbl{font-size:.7rem;letter-spacing:2px;color:#3a5a4a;text-transform:uppercase;}
.se-top{margin-top:10px;}
.se-top-lbl{font-size:.65rem;letter-spacing:1.5px;color:#3a5a4a;text-transform:uppercase;margin-bottom:7px;}
.se-tr{display:flex;align-items:center;gap:7px;font-size:.82rem;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;}
.se-tr:hover{background:rgba(255,255,255,.02);}
.se-ri{font-family:'Oswald',sans-serif;font-weight:700;color:#fbbf24;min-width:26px;}
.se-tp{font-family:'Oswald',sans-serif;font-weight:700;color:#4ade80;margin-left:auto;}
.sc-panels{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.sc-panel{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:13px;}
.scp-t{font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1.5px;color:#4ade80;text-transform:uppercase;margin-bottom:10px;}
.sct-h{font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06);}
.sct-h.g{color:#4ade80;}
.sct-h.r{color:#ef4444;}
.sct-row{display:flex;justify-content:space-between;font-size:.8rem;color:#a0b0c0;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.g{color:#4ade80;}
.r{color:#ef4444;}
.bl{color:#60a5fa;}
.tl{color:#2dd4bf;}
.go{color:#fbbf24;}
.sc-sg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;text-align:center;}
.sc-sg-i{background:#0a1525;border-radius:6px;padding:9px 5px;}
.sc-sg-v{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:#e2e8f0;}
.sc-sg-l{font-size:.65rem;color:#4a6a7a;margin-top:1px;}
.sc-tbl-wrap{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:13px;}
.ptable{width:100%;border-collapse:collapse;font-size:.75rem;min-width:700px;}
.ptable th{padding:5px 7px;text-align:left;font-family:'Oswald',sans-serif;font-weight:600;font-size:.65rem;letter-spacing:1px;color:#3a5a6a;text-transform:uppercase;border-bottom:1px solid #1a2d40;}
.ptable td{padding:6px 7px;border-bottom:1px solid rgba(255,255,255,.03);color:#b0c0d0;}
.ptable tr:hover td{background:rgba(255,255,255,.02);}

/* RANKING */
.ranking-view{display:flex;flex-direction:column;gap:12px;}
.rk-global{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:13px;}
.rk-g-title{font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;color:#fbbf24;letter-spacing:1px;margin-bottom:10px;}
.rk-gr{display:flex;align-items:center;gap:7px;padding:6px;border-radius:7px;font-size:.8rem;cursor:pointer;transition:.15s;}
.rk-gr:hover{background:rgba(255,255,255,.03);}
.rk-gr.mine{background:rgba(74,222,128,.06);border-left:3px solid #4ade80;}
.rk-gr.insquad{background:rgba(74,222,128,.03);}
.rk-i{font-family:'Oswald',sans-serif;font-weight:700;color:#4a6a7a;min-width:22px;font-size:.82rem;}
.rk-name{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rk-country{font-size:.7rem;color:#4a6a7a;min-width:95px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rk-pts{font-family:'Oswald',sans-serif;font-weight:700;color:#4ade80;min-width:38px;text-align:right;}
.rk-badge{font-size:.65rem;padding:2px 5px;border-radius:8px;background:rgba(74,222,128,.15);color:#4ade80;font-weight:700;flex-shrink:0;}
.rk-badge.empty{background:transparent;color:#1a3a20;border:1px solid #1a3a20;}

/* LEAGUES */
.leagues-view{display:flex;flex-direction:column;gap:12px;}
.lv-hd{margin-bottom:2px;}
.lv-title{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:1px;}
.lv-sub{font-size:.8rem;color:#4a6a7a;margin-top:3px;}
.lv-tabs{display:flex;gap:7px;flex-wrap:wrap;}
.lvt{padding:7px 18px;border-radius:18px;border:1px solid #1a2d40;background:transparent;color:#4a6a7a;font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.lvt.active{background:#4ade80;color:#07111e;border-color:#4ade80;}
.lv-panel{display:flex;flex-direction:column;gap:12px;}
.lv-liga-card{background:#0d1b2a;border:1px solid #1a3a20;border-radius:12px;padding:16px;}
.llc-invite{background:#071a10;border:1px dashed #1a4a20;border-radius:7px;padding:9px 12px;font-size:.8rem;color:#4a6a5a;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;}
.llc-invite strong{color:#4ade80;font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:3px;}
.llc-copy{background:transparent;border:1px solid #2a4a28;color:#4ade80;border-radius:5px;padding:3px 9px;font-size:.72rem;cursor:pointer;}
.lv-lb{background:#0d1b2a;border:1px solid #1a2d40;border-radius:12px;padding:14px;}
.btn-leave{background:transparent;border:1px solid #2a1010;color:#ef4444;border-radius:7px;padding:8px 16px;font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;align-self:flex-start;}
.lv-join-card,.lv-create-card{background:#0d1b2a;border:1px solid #1a2d40;border-radius:12px;padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:11px;}
.ljc-input{background:#0a1525;border:2px solid #1e2d40;color:#e2e8f0;border-radius:8px;padding:11px 18px;font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:5px;text-align:center;width:200px;outline:none;}
.ljc-input:focus{border-color:#4ade80;}
.btn-join,.btn-create{background:#4ade80;color:#07111e;border:none;border-radius:8px;padding:10px 26px;font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.5px;}

/* RULES */
.rules-view{display:flex;flex-direction:column;gap:12px;}
.rv-title{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:2px;}
.rv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px;}
.rv-card{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:14px;}
.rv-ic{font-size:1.5rem;margin-bottom:7px;}
.rv-ct{font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;color:#4ade80;letter-spacing:.5px;margin-bottom:5px;}
.rv-cb{font-size:.8rem;color:#7a8a9a;line-height:1.6;}
.rv-cb strong{color:#e2e8f0;}

/* PROFILE */
.profile-view{max-width:580px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
.pv-hd{display:flex;align-items:center;gap:13px;background:#0d1b2a;border:1px solid #1a3a20;border-radius:12px;padding:16px;}
.pv-av{width:52px;height:52px;background:linear-gradient(135deg,#4ade80,#22c55e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#07111e;flex-shrink:0;}
.pv-name{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.5px;}
.pv-email{font-size:.78rem;color:#4a6a5a;margin-top:2px;}
.pv-admin-badge{margin-top:5px;display:inline-block;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;border-radius:4px;padding:2px 7px;font-size:.68rem;font-weight:700;letter-spacing:1px;}

/* ADMIN */
.admin-panel{display:flex;flex-direction:column;gap:14px;}
.ap-hd{background:linear-gradient(135deg,#1a1500,#0d1a00);border:1px solid #3a3000;border-radius:12px;padding:18px;text-align:center;}
.ap-badge{display:inline-block;background:#fbbf24;color:#1a1000;border-radius:4px;padding:3px 11px;font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2px;margin-bottom:7px;}
.ap-title{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:2px;}
.ap-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;}
.ap-kpi{background:#0d1b2a;border:1px solid;border-radius:10px;padding:14px;text-align:center;}
.apk-i{font-size:1.3rem;margin-bottom:4px;}
.apk-v{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;line-height:1;}
.apk-l{font-size:.65rem;letter-spacing:1px;color:#4a6a7a;text-transform:uppercase;margin-top:3px;}
.admin-tabs{display:flex;gap:7px;}
.admin-tab{padding:8px 18px;border-radius:7px;border:1px solid #1a2d40;background:transparent;color:#4a6a7a;font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;}
.admin-tab.active{background:#4ade80;color:#07111e;border-color:#4ade80;}
.ap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.ap-card{background:#0d1b2a;border:1px solid #1a2d40;border-radius:10px;padding:14px;}
.ap-card.full,.ap-card.wide{grid-column:1/-1;}
.apc-t{font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1.5px;color:#4a6a7a;text-transform:uppercase;margin-bottom:12px;}
.ap-br{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.apbr-l{font-size:.76rem;min-width:130px;color:#a0b0c0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.apbr-tr{flex:1;background:rgba(255,255,255,.04);border-radius:4px;height:7px;overflow:hidden;}
.apbr-f{height:7px;border-radius:4px;transition:.4s;}
.apbr-v{font-family:'Oswald',sans-serif;font-weight:700;font-size:.85rem;min-width:22px;text-align:right;color:#e2e8f0;}
.ap-tbl{width:100%;border-collapse:collapse;font-size:.75rem;}
.ap-tbl th{padding:6px 9px;text-align:left;font-size:.65rem;letter-spacing:1px;color:#3a5a6a;text-transform:uppercase;border-bottom:1px solid #1a2d40;white-space:nowrap;}
.ap-tbl td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.03);color:#b0c0d0;}
.ap-tbl tr:hover td{background:rgba(255,255,255,.02);}
.admin-row td{color:#fbbf24!important;}

  .hdr{padding:9px 12px;}
  .hdr-title{font-size:.95rem;}
  .hdr-stats{display:none;}
  .hdr-ut{display:none;}
  .sidebar-ads{display:none;}
  .app-layout{display:block;}
  .pitch-ad-side{display:none;}

function applyAdminStats(){
  try{
    var stats=JSON.parse(localStorage.getItem("gm_stats_by_name")||"{}");
    if(!Object.keys(stats).length)return false;

const _authListeners = [];
let _cu = getLS("gm_session", null);
const notifyAuth = u => { _cu=u; setLS("gm_session",u); _authListeners.forEach(f=>f(u)); };

const Auth = {
  onAuthStateChanged: fn => { _authListeners.push(fn); fn(_cu); return ()=>{}; },
  register: async ({ email, password, dni, nombre, apellido, comunidad, pais, provincia, edad, equipo }) => {
    const users = getLS("gm_users",[]);
    const dniUsers = users.filter(u=>u.dni===dni);
    if (dniUsers.length>=5) return { error:"Ya hay 5 cuentas con ese DNI" };
    if (users.find(u=>u.email===email)) return { error:"Email ya registrado" };
    const uid = "u_"+Math.random().toString(36).slice(2);
    const playerNum = String(users.length + 1).padStart(4, "0");
    const playerId = "GM-" + playerNum;
    const user = { uid, email, dni, nombre, apellido, comunidad, pais, provincia, edad:parseInt(edad),
                   equipo, admin:email===ADMIN_EMAIL, pts:0, profileComplete:true, liga:null, playerId };
    setLS("gm_users",[...users,user]); return { ok:true, user };
  },
  login: async ({ email, password }) => {
    const users = getLS("gm_users",[]);
    const user = users.find(u=>u.email===email);
    if (!user) return { error:"Email no encontrado" };
    if (user.password && user.password !== password) return { error:"Contraseña incorrecta" };
    notifyAuth(user); return { ok:true, user };
  },
  signOut: async () => notifyAuth(null),
  updateProfile: async data => {
    const users = getLS("gm_users",[]);
    const idx = users.findIndex(u=>u.uid===_optionalChain([_cu, 'optionalAccess', _2 => _2.uid]));
    if(idx!==-1){ users[idx]={...users[idx],...data}; setLS("gm_users",users); notifyAuth(users[idx]); }
  },
};

const DB = {
  getUsers: ()=> getLS("gm_users",[]),
  getUser:  uid=> getLS("gm_users",[]).find(u=>u.uid===uid),
  getLeagues:()=> getLS("gm_leagues",[]),
  getLeague: id=> getLS("gm_leagues",[]).find(l=>l.id===id),
  getAds:    ()=> getLS("gm_ads",[]),
  saveAds:   ads=> setLS("gm_ads",ads),
  createLeague: (data,uid) => {
    const leagues=getLS("gm_leagues",[]);
    const id="L"+Math.random().toString(36).slice(2,7).toUpperCase();
    const liga={id,...data,adminUid:uid,miembros:[uid],creada:Date.now()};
    setLS("gm_leagues",[...leagues,liga]);
    const users=getLS("gm_users",[]);
    const idx=users.findIndex(u=>u.uid===uid);
    if(idx!==-1){users[idx].liga=id;setLS("gm_users",users);notifyAuth(users[idx]);}
    return liga;
  },
  joinLeague: (ligaId,uid) => {
    const leagues=getLS("gm_leagues",[]);
    const liga=leagues.find(l=>l.id===ligaId);
    if(!liga) return {error:"Liga no encontrada"};
    if(liga.miembros.includes(uid)) return {error:"Ya estás en esta liga"};
    if(liga.miembros.length>=liga.maxMiembros) return {error:"Liga llena"};
    liga.miembros.push(uid); setLS("gm_leagues",leagues);
    const users=getLS("gm_users",[]);
    const idx=users.findIndex(u=>u.uid===uid);
    if(idx!==-1){users[idx].liga=ligaId;setLS("gm_users",users);notifyAuth(users[idx]);}
    return {ok:true};
  },
  leaveLeague: (ligaId,uid) => {
    const leagues=getLS("gm_leagues",[]);
    const liga=leagues.find(l=>l.id===ligaId);
    if(liga){liga.miembros=liga.miembros.filter(m=>m!==uid);setLS("gm_leagues",leagues);}
    const users=getLS("gm_users",[]);
    const idx=users.findIndex(u=>u.uid===uid);
    if(idx!==-1){users[idx].liga=null;setLS("gm_users",users);notifyAuth(users[idx]);}
  },
  trackAdView: (adId) => {
    const ads=getLS("gm_ads",[]);
    const a=ads.find(x=>x.id===adId);
    if(a){a.views=(a.views||0)+1;setLS("gm_ads",ads);}
  },
  trackAdClick: (adId) => {
    const ads=getLS("gm_ads",[]);
    const a=ads.find(x=>x.id===adId);
    if(a){a.clicks=(a.clicks||0)+1;setLS("gm_ads",ads);}
  },
};

function useToast() {
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="info")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);
  return {toasts,add};
}

function getCommunities() {
  const base = ["Macabi","Cisaab","Hacoaj","Círculo","Venado","Mi Refugio","Kadima","Barkojba",
    "Lambtroh Hakol","Hebraica","Or Jadash","Dor Jadash","Jai (Bialik)","Iona",
    "Amijai","Betam del Oeste","Bet El","Bet Hilel","Juventud Sión","Tfilat Shalom",
    "Pardes","Olami Almagro","Olami Belgrano","Olami Urquiza","Olami Villa Crespo","Olami Palermo"];
  const fromUsers = getLS("gm_users",[]).map(u=>u.comunidad).filter(c=>c&&c!=="Otra / Independiente");
  const fromSaved = getLS("gm_comunidades",[]);
  return [...new Set([...base,...fromUsers,...fromSaved])].sort((a,b)=>a.localeCompare(b));
}

// RANKING VIEW
// ═══════════════════════════════════════════════════════════════════════════
function RankingView({ user }) {
  const [tab, setTab] = useState("usuarios");

  const allUsers = useMemo(() => DB.getUsers().filter(u => !u.admin && u.pagado !== false), []);

  // Sort users by pts, use prode pts as tiebreaker
  const userRanking = useMemo(() =>
    [...allUsers].sort((a, b) => {
      if ((b.pts||0) !== (a.pts||0)) return (b.pts||0) - (a.pts||0);
      return (b.ptsProd||0) - (a.ptsProd||0);
    }), [allUsers]);

  // Community ranking: sum pts (equipo) + pts prode per community
  const communityRanking = useMemo(() => {
    const map = {};
    allUsers.forEach(u => {
      const c = u.comunidad || "Sin comunidad";
      if (!map[c]) map[c] = { comunidad: c, pts: 0, ptsProd: 0, ptsTotal: 0, count: 0 };
      // Calcular puntos prode leyendo desde localStorage (igual que tab Prode)
      const pickData = getLS("gm_prode_" + u.uid, {});
      const ptsProd = WC2026_FIXTURE.reduce(function(acc, m) {
        return acc + (calcProdePoints(pickData[m.id], m) || 0);
      }, 0);
      map[c].pts     += (u.pts || 0);
      map[c].ptsProd += ptsProd;
      map[c].ptsTotal += (u.pts || 0) + ptsProd;
      map[c].count++;
    });
    return Object.values(map).sort((a, b) => b.ptsTotal - a.ptsTotal);
  }, [allUsers]);

  const myPos = userRanking.findIndex(u => u.uid === user.uid) + 1;
  const myUser = allUsers.find(u => u.uid === user.uid);

      React.createElement('div', { style: {fontFamily:"Oswald,sans-serif",fontSize:"2rem",fontWeight:900,color:"#4ade80",minWidth:50,textAlign:"center"} }, "#"+myPos),
      React.createElement('div', { style: {flex:1} },
        React.createElement('div', { style: {fontWeight:700,color:"#e2e8f0",fontSize:".95rem"} }, myUser.equipo),

        { id:"comunidades", label:"Comunidades" },

        return React.createElement('button', { key:t.id, onClick:()=>setTab(t.id), style: {
          padding:"8px 18px", borderRadius:20, border:"1px solid",

        : userRanking.map((u, i) =>
          React.createElement('div', { key: u.uid, style: {
            display:"flex", alignItems:"center", gap:12, padding:"10px 14px",

            border:"1px solid", borderColor: u.uid===user.uid ? "rgba(74,222,128,.25)" : "rgba(255,255,255,.04)",
            borderRadius:8
          }},
            React.createElement('div', { style: {fontFamily:"Oswald,sans-serif",fontWeight:900,fontSize:"1rem",minWidth:30,textAlign:"center",color:medalColor(i)} }, i<3?"★"+(i+1):"#"+(i+1)),

            ),
            React.createElement('div', { style: {textAlign:"right"} },
              React.createElement('div', { style: {fontFamily:"Oswald,sans-serif",fontWeight:700,fontSize:"1.1rem",color: i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":"#4ade80"} }, u.pts||0),
              React.createElement('div', { style: {fontSize:".65rem",color:"#3a5a4a"} }, "pts")
            )
          )
        )
    ),

    // Prode ranking
    tab === "prode" && React.createElement('div', { style:{display:"flex",flexDirection:"column",gap:4} },
      (function() {
        const prodeRanking = [...allUsers].map(function(u) {
          const prodeKey = "gm_prode_" + u.uid;

          if (b.ptsProd !== a.ptsProd) return b.ptsProd - a.ptsProd;
          return b.exactos - a.exactos;

        if (prodeRanking.length === 0)
          return React.createElement('div', { style:{textAlign:"center",padding:40,color:"#3a5a4a",fontSize:".9rem"} }, "Sin participantes");

          return React.createElement('div', { key: u.uid, style: {

              i<3 ? "★"+(i+1) : "#"+(i+1)
            ),

              React.createElement('div', { style:{fontWeight:600,fontSize:".88rem",color:"#e2e8f0"} }, u.equipo),

            ),
            React.createElement('div', { style: {textAlign:"right"} },
              React.createElement('div', { style: {fontFamily:"Oswald,sans-serif",fontWeight:700,fontSize:"1.1rem",color: i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":"#4ade80"} }, c.ptsTotal),

// Cargar scores publicados por admin en WC2026_FIXTURE (necesario para el prode)
(function() {
  function applyScores() {
    try {
      var cache = JSON.parse(localStorage.getItem("gm_matches_cache") || "[]");
      var map = {};
      cache.forEach(function(m) {
        if (m.score_home !== null && m.score_home !== undefined)
          map[m.id] = { sh: m.score_home, sa: m.score_away };
      });
      WC2026_FIXTURE.forEach(function(m) {
        if (map[m.id]) { m.score_home = map[m.id].sh; m.score_away = map[m.id].sa; }
      });
    } catch(e) {}
  }
  applyScores();
  window.addEventListener("storage", function(e) {
    if (e.key === "gm_matches_cache" || e.key === "gm_published_matches") applyScores();
  });
})();


function canProde(match) {
  const kickoff = new Date(match.date).getTime();
  return Date.now() < kickoff - 10*60*1000;
}

function matchStatus(match) {
  const now = Date.now();
  const kickoff = new Date(match.date).getTime();
  if (now < kickoff - 10*60*1000) return "open";     // prode abierto
  if (now < kickoff) return "closing";                // cierra en menos de 10min
  if (match.score_home !== null && match.score_home !== undefined) return "finished";
  return "live";
}

function calcProdePoints(userPick, match) {
  if (!userPick || match.score_home === null || match.score_home === undefined) return null;
  const ph = parseInt(userPick.home), pa = parseInt(userPick.away);
  const rh = parseInt(match.score_home), ra = parseInt(match.score_away);
  if (ph === rh && pa === ra) return 3; // exacto
  const pickedSign = ph > pa ? 1 : ph < pa ? -1 : 0;
  const realSign   = rh > ra ? 1 : rh < ra ? -1 : 0;
  if (pickedSign === realSign) return 1; // ganador correcto
  return 0;
}

      _installPrompt = null;
      if (r.outcome==='accepted') {
        var btn = document.getElementById('pwaInstallBtn');
        if (btn) btn.style.display='none';
      }
    });
  } else {
    alert('En iOS: toca el boton Compartir y luego "Agregar a pantalla de inicio"');
  }
}
</script>
</body>
</html>
